<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Tracker | Path of Progress</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;500;600;700;800&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ══════════════════════════════════════════════
   COLOR SYSTEM — Cristache Palette
   Silver Bird   #FBF5F0  (near-white cream)
   Prairie Dune  #FBD5BD  (warm peach)
   Femininity    #C7C2CE  (lavender grey)
   Indigo Bloom  #8A83DA  (medium indigo)
   Royal Wisteria#463699  (deep indigo)
   Cold Steel    #262335  (near-black bg)
══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Core Cristache palette */
  --silver-bird:#FBF5F0;
  --prairie-dune:#FBD5BD;
  --femininity:#C7C2CE;
  --indigo-bloom:#8A83DA;
  --royal-wisteria:#463699;
  --cold-steel:#262335;

  /* Semantic roles */
  --bg:#262335;
  --bg-deep:#1C1A28;
  --surface:rgba(138,131,218,0.10);
  --surface2:rgba(138,131,218,0.18);
  --border:rgba(138,131,218,0.22);
  --border2:rgba(138,131,218,0.55);
  --text:#FBF5F0;
  --text2:#FBD5BD;
  --text3:#C7C2CE;
  --dim:rgba(251,245,240,0.78);
  --very-dim:rgba(251,245,240,0.50);

  /* Accent aliases for buttons / highlights */
  --col-cream:#FBF5F0;
  --col-gold-lt:#FBD5BD;
  --col-gold:#8A83DA;
  --col-amber:#463699;
  --col-teal:#463699;
  --col-teal-dark:#1C1A28;

  /* Gradients */
  --grad-accent:linear-gradient(135deg,#463699,#8A83DA);
  --grad-bar:linear-gradient(90deg,#463699,#8A83DA,#C7C2CE);
  --grad-hero:linear-gradient(160deg,#1C1A28 0%,#262335 55%,#463699 100%);
  --grad-nav:rgba(28,26,40,0.98);

  /* UI */
  --f-body:'Inter',sans-serif;
  --f-brand:'Orbitron',sans-serif;
  --f-title:'Cinzel',serif;
  --radius-card:14px;
  --radius-sm:8px;
  --shadow-glow:0 0 28px rgba(138,131,218,0.22);
  --shadow-card:0 2px 20px rgba(0,0,0,0.28);
}

html,body{height:100%;overflow:hidden}
body{font-family:var(--f-body);background:var(--bg);color:var(--text);font-size:16px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:var(--f-body);border:none;outline:none;background:none}
input,select{font-family:var(--f-body);outline:none;color:#fff}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(138,131,218,0.35);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(20px)}}

/* ── Pages ── */
.page{position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;transition:opacity .3s,transform .3s;z-index:1}
.page.hidden{opacity:0;pointer-events:none;transform:translateX(16px)}
.page-content{animation:fadeIn .35s ease}

/* ── Shared cards & utils ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:16px;box-shadow:var(--shadow-card)}
.progress-bar{height:6px;background:rgba(255,255,255,0.07);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;border-radius:100px;transition:width 1s cubic-bezier(0.4,0,0.2,1)}
.hidden-scroll{-ms-overflow-style:none;scrollbar-width:none}
.hidden-scroll::-webkit-scrollbar{display:none}

.sec-label{
  font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:var(--col-gold-lt);margin-bottom:14px;margin-top:26px;
  display:flex;align-items:center;gap:8px
}
.sec-label::after{content:'';flex:1;height:1px;background:rgba(240,168,48,0.22)}

.info-btn{
  background:none;border:1px solid rgba(237,216,223,0.28);border-radius:50%;
  width:18px;height:18px;color:var(--col-cream);font-size:10px;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;
  transition:all .2s;cursor:pointer;flex-shrink:0
}
.info-btn:hover{background:rgba(237,216,223,0.1);border-color:var(--col-cream);color:#fff}

/* ── Toast Notification (replaces all alert/confirm) ── */
#toast-container{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  z-index:9000;display:flex;flex-direction:column;gap:8px;align-items:center;
  pointer-events:none
}
.toast{
  background:#1C1A28;border:1px solid var(--border2);border-radius:12px;
  padding:11px 20px;font-size:13px;font-weight:600;color:#fff;
  white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,0.45);
  animation:toastIn .28s ease;pointer-events:auto;max-width:90vw;white-space:normal;text-align:center
}
.toast.success{border-color:rgba(100,220,140,0.4);background:#0f1e16}
.toast.error{border-color:rgba(235,100,80,0.4);background:#200f0f}
.toast.warn{border-color:rgba(251,213,189,0.4);background:#1e1512}

/* ── Confirm modal (replaces browser confirm()) ── */
#confirm-overlay{
  display:none;position:fixed;inset:0;z-index:8000;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(6px)
}
.confirm-box{
  background:#1C1A28;border:1px solid var(--border2);border-radius:var(--radius-card);
  padding:24px;width:90%;max-width:360px;
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  animation:fadeIn .2s ease-out
}
.confirm-title{font-family:var(--f-title);font-size:17px;color:#fff;margin-bottom:8px}
.confirm-msg{font-size:13px;color:var(--dim);margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:8px}

/* ── Nav ── */
nav{
  position:sticky;top:0;z-index:100;display:flex;align-items:center;
  justify-content:space-between;padding:0 22px;height:56px;
  background:var(--grad-nav);backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);border-bottom:1px solid var(--border)
}
.nav-logo{
  font-family:var(--f-brand);font-size:16px;font-weight:900;
  letter-spacing:2.5px;text-transform:uppercase;
  background:linear-gradient(90deg,var(--silver-bird),var(--indigo-bloom),var(--royal-wisteria));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 12px rgba(138,131,218,0.5))
}
.nav-right{display:flex;gap:5px;align-items:center}
.nav-link{
  font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--dim);padding:6px 11px;border-radius:7px;transition:all .2s
}
.nav-link:hover,.nav-link.active{color:#fff;background:rgba(138,131,218,0.18)}

/* ── Sync dot ── */
.sync-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
  transition:background .3s;margin-right:2px
}
.sync-dot.ok{background:#8A83DA;box-shadow:0 0 6px #8A83DA88}
.sync-dot.syncing{background:var(--indigo-bloom);animation:spin 1s linear infinite;border-radius:0;clip-path:polygon(50% 0,100% 38%,82% 100%,18% 100%,0 38%)}
.sync-dot.error{background:#ff6b6b}

/* ── Loading overlay ── */
#loading-overlay{
  position:fixed;inset:0;background:var(--bg);z-index:500;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity .4s
}
#loading-overlay.done{opacity:0;pointer-events:none}
.loading-spinner{
  width:36px;height:36px;border:2px solid rgba(138,131,218,0.15);
  border-top-color:var(--indigo-bloom);border-radius:50%;animation:spin .8s linear infinite
}
.loading-text{font-family:var(--f-brand);font-size:12px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--indigo-bloom)}
.loading-sub{font-size:11px;color:var(--dim);letter-spacing:1px}

/* ══════════════════════
   LOG PAGE — Grid cards
══════════════════════ */
.log-skill-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:11px;margin-bottom:8px
}
.log-skill-card{
  background:var(--surface);border:1px solid var(--border);border-radius:13px;
  padding:16px 14px;transition:border-color .2s,box-shadow .2s,background .2s;
  display:flex;flex-direction:column;gap:7px;position:relative;overflow:hidden
}
.log-skill-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(138,131,218,0.06),transparent);
  pointer-events:none
}
.log-skill-card.met{
  border-color:rgba(138,131,218,0.65);
  background:rgba(138,131,218,0.13);
  box-shadow:0 0 20px rgba(138,131,218,0.18)
}
.log-skill-card-name{
  font-size:13px;font-weight:700;color:var(--silver-bird);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:flex;align-items:center;gap:5px
}
.log-skill-card.met .log-skill-card-name{color:#fff}
.log-skill-card-goal{font-size:12px;color:var(--dim);font-weight:600}
.log-skill-card-goal.met{color:var(--indigo-bloom);font-weight:700}
.log-skill-input-wrap{display:flex;align-items:center;gap:5px;margin-top:2px}
.log-skill-input{
  flex:1;min-width:0;background:rgba(70,54,153,0.22);
  border:1px solid rgba(138,131,218,0.30);border-radius:8px;
  padding:8px 10px;color:#FBF5F0;font-size:16px;font-weight:700;
  text-align:center;width:100%;transition:border-color .2s;
  -moz-appearance:textfield
}
.log-skill-input::-webkit-inner-spin-button,
.log-skill-input::-webkit-outer-spin-button{
  -webkit-appearance:inner-spin-button;
  opacity:1;
  background:rgba(138,131,218,0.25);
  border-left:1px solid rgba(138,131,218,0.30);
  cursor:pointer;
  filter:invert(1) hue-rotate(240deg) brightness(1.3)
}
.log-skill-input:focus{border-color:var(--border2);background:rgba(70,54,153,0.30)}
.log-skill-input::placeholder{font-size:13px;font-weight:400;color:var(--very-dim)}
.log-save-btn{
  background:var(--royal-wisteria);border:none;border-radius:8px;
  padding:8px 11px;color:#FBF5F0;font-size:12px;font-weight:700;
  transition:background .2s;white-space:nowrap;flex-shrink:0
}
.log-save-btn:hover{background:var(--indigo-bloom)}
.log-progress-bar{height:4px;border-radius:100px;background:rgba(255,255,255,0.08);overflow:hidden;margin-top:2px}
.log-progress-fill{height:100%;border-radius:100px;transition:width .6s}

/* ── Dashboard ── */
.dash-skill-card{
  background:var(--surface);border:1px solid var(--border);border-radius:13px;
  padding:14px;cursor:pointer;transition:border-color .2s,transform .18s,box-shadow .2s;
  box-shadow:var(--shadow-card)
}
.dash-skill-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow-glow)}
.rank-pts-bar{height:6px;background:rgba(255,255,255,0.08);border-radius:100px;overflow:hidden;margin:5px 0 3px}
.rank-pts-fill{height:100%;border-radius:100px;transition:width 1s cubic-bezier(0.4,0,0.2,1)}

/* ── Overall Level — mobile-first stacked ── */
.overall-card{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  max-width:820px;margin:0 auto;padding:14px 16px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-card);box-shadow:var(--shadow-card)
}
.overall-badge-wrap{
  width:54px;height:54px;border-radius:12px;border:1px solid var(--border2);
  background:rgba(255,255,255,0.04);display:flex;align-items:center;
  justify-content:center;flex-shrink:0
}
.overall-info{flex:1;min-width:0}
.overall-bar-wrap{min-width:160px;flex:2;max-width:340px}

/* Rank road — scrolls horizontally, always readable */
.rank-road-wrap{overflow-x:auto;padding:10px 0 6px;margin-top:8px}
.rank-road{display:inline-flex;gap:0;align-items:center;padding:4px 8px;white-space:nowrap}
.rank-point{display:flex;flex-direction:column;align-items:center;min-width:48px;flex-shrink:0}
.rank-dot{width:11px;height:11px;border-radius:50%;background:var(--surface2);margin:3px 0;border:2px solid var(--border)}
.rank-dot.current{background:var(--col-gold);border-color:#fff;box-shadow:0 0 10px var(--col-gold)}
.rank-dot.past{background:var(--col-amber);border-color:rgba(240,168,48,0.5)}
.rank-name{font-size:8px;font-weight:700;color:var(--dim);text-align:center;line-height:1.2;max-width:48px;white-space:normal}
.rank-xp-lbl{font-size:7px;color:var(--very-dim);white-space:nowrap}
.rank-connector{width:18px;height:2px;background:var(--border);align-self:center;flex-shrink:0}
.rank-connector.past-conn{background:var(--col-amber)}

/* ── Skill Detail ── */
.sd-hero{padding:22px 20px;background:var(--grad-hero);border-bottom:1px solid var(--border)}
.sd-hero-inner{max-width:660px;margin:0 auto;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.sd-rank-big{flex-shrink:0;width:76px;height:76px;border-radius:16px;border:1px solid var(--border2);background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center}
.sd-right{flex:1;display:flex;flex-direction:column;gap:5px}
.sd-skill-name{font-family:var(--f-title);font-size:22px;font-weight:700;color:#fff}
.sd-body{max-width:660px;margin:0 auto;padding:20px 16px 90px}

/* ── Streak ── */
.streak-box{margin-bottom:16px;padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card)}
.streak-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.streak-lbl{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3)}
.streak-num{font-family:var(--f-title);font-size:26px;font-weight:700;color:#fff}
.streak-unit{font-size:12px;font-weight:600;color:var(--dim)}
.streak-track{position:relative;height:10px;background:rgba(255,255,255,0.07);border-radius:100px;overflow:visible}
.streak-fill{height:10px;border-radius:100px;background:var(--grad-bar);transition:width 1.2s cubic-bezier(.16,1,.3,1);position:relative;min-width:3px;box-shadow:0 0 12px rgba(138,131,218,0.55)}
.streak-flame{position:absolute;right:-9px;top:-11px;font-size:18px;filter:drop-shadow(0 0 5px rgba(255,140,50,.65))}
.streak-miles{display:flex;justify-content:space-between;margin-top:7px;font-size:10px;font-weight:600;letter-spacing:1px;color:var(--very-dim)}

/* ── Skill level bar ── */
.sd-rank-bar-box{margin-bottom:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card)}
.sd-rank-bar-track{height:8px;background:rgba(255,255,255,0.06);border-radius:100px;overflow:hidden}
.sd-rank-bar-fill{height:100%;border-radius:100px;transition:width 1s cubic-bezier(0.4,0,0.2,1)}

/* ── Chart ── */
.chart-box{margin-bottom:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card)}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.chart-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.chart-tabs{display:flex;gap:3px}
.chart-tab{background:none;border:1px solid var(--border);border-radius:5px;padding:5px 9px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);transition:all .2s}
.chart-tab.active{background:rgba(138,131,218,0.22);border-color:var(--border2);color:#FBF5F0}
.chart-tab:hover:not(.active){border-color:rgba(138,131,218,0.4);color:var(--text3)}
.chart-wrap{position:relative;height:200px;overflow-x:hidden;overflow-y:visible}
.chart-scroll{overflow-x:auto;height:100%;scrollbar-width:thin;scrollbar-color:rgba(138,131,218,0.30) transparent}
.chart-scroll::-webkit-scrollbar{height:3px}
.chart-scroll::-webkit-scrollbar-thumb{background:rgba(138,131,218,0.30);border-radius:3px}
.bar-group{display:inline-flex;gap:4px;align-items:flex-end;height:100%;padding:28px 8px 32px;min-width:max-content}
.bar-col-wrap{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;min-width:24px;height:100%;gap:0}
.bar-val{font-size:8px;font-weight:700;color:var(--text3);margin-bottom:3px;white-space:nowrap;text-align:center;line-height:1;flex-shrink:0}
.bar-col{width:14px;border-radius:3px 3px 0 0;min-height:2px;flex-shrink:0}
.bar-lbl-wrap{display:flex;flex-direction:column;align-items:center;margin-top:4px;gap:1px;flex-shrink:0}
.bar-lbl{font-size:8px;font-weight:600;color:var(--dim);white-space:nowrap}
.bar-lbl-yr{font-size:7px;font-weight:700;color:rgba(138,131,218,0.70);white-space:nowrap}
.goal-line{position:absolute;left:0;right:0;border-top:1.5px dashed rgba(138,131,218,0.60);pointer-events:none;z-index:2}
.goal-lbl{position:absolute;right:6px;top:-13px;font-size:8px;font-weight:700;color:var(--indigo-bloom);background:rgba(28,26,40,0.92);padding:1px 4px;border-radius:3px}
.chart-empty{display:flex;align-items:center;justify-content:center;height:100%;font-size:13px;color:var(--dim)}

/* ── Calendar ── */
.cal-box{padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card)}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-family:var(--f-title);font-size:14px;font-weight:700;color:#fff}
.cal-nav-btns{display:flex;gap:4px}
.cal-nav-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text3);font-size:14px;line-height:1;transition:all .2s}
.cal-nav-btn:hover{border-color:var(--border2);color:#fff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-head{text-align:center;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--very-dim);padding-bottom:7px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;font-size:10px;font-weight:600;color:rgba(251,245,240,0.32);background:rgba(255,255,255,0.028);border:1px solid rgba(255,255,255,0.05);transition:all .2s;gap:1px;padding:2px}
.cal-cell.empty{background:none;border:none}
.cal-cell.cal-today{border-color:rgba(138,131,218,0.6);color:var(--indigo-bloom)}
.cal-cell.cal-met{background:rgba(138,131,218,0.50);border-color:var(--indigo-bloom);color:#FBF5F0;font-weight:800;box-shadow:0 0 10px rgba(138,131,218,0.40)}
.cal-cell.cal-partial{background:rgba(138,131,218,0.14);border-color:rgba(138,131,218,0.38);color:var(--indigo-bloom)}
.cal-day-num{font-size:10px;font-weight:700;line-height:1}
.cal-day-val{font-size:7px;font-weight:600;line-height:1;opacity:.85}
.cal-legend{display:flex;gap:12px;margin-top:9px;justify-content:flex-end}
.cal-legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--very-dim)}
.cal-legend-dot{width:8px;height:8px;border-radius:2px}

/* ── Analytics ── */
.analytics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-top:16px}
.analytics-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-card);padding:16px;box-shadow:var(--shadow-card);min-width:0;overflow:hidden}
.analytics-card h4{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--col-gold-lt);margin-bottom:12px}
.analytics-bar-item{display:flex;align-items:center;gap:7px;margin-bottom:8px;min-width:0}
.analytics-bar-label{flex:1;font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.analytics-bar-value{font-size:12px;font-weight:600;color:var(--text);min-width:40px;text-align:right;flex-shrink:0}
.analytics-bar-track{flex:2;height:8px;background:rgba(255,255,255,0.07);border-radius:100px;overflow:hidden;min-width:40px}
.analytics-bar-fill{height:100%;border-radius:100px;transition:width .8s}

/* Category level card */
.cat-level-hero{
  display:flex;gap:16px;flex-wrap:wrap;

<script>
function showToast(msg, type='info', duration=2800){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className='toast '+(type==='success'?'success':type==='error'?'error':type==='warn'?'warn':'');
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>{
    t.style.animation='toastOut .28s ease forwards';
    setTimeout(()=>t.remove(), 280);
  }, duration);
}

let _confirmResolve=null;
function showConfirm(title, msg, okLabel='Delete'){
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-ok-btn').textContent=okLabel;
  document.getElementById('confirm-overlay').style.display='block';
  return new Promise(res=>{ _confirmResolve=res; });
}
function resolveConfirm(val){
  document.getElementById('confirm-overlay').style.display='none';
  if(_confirmResolve){ _confirmResolve(val); _confirmResolve=null; }
}
</script>

<!-- ══════════════════════════════════════════════
     SUPABASE DATA LAYER
══════════════════════════════════════════════ -->
<script>
function setSyncStatus(state){
  ['sync-dot','sync-dot-2'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.className='sync-dot '+state;
  });
}

async function fetchAllFromSupabase(){
  setSyncStatus('syncing');
  try{
    const {data:cats,error:ce}=await _sb.from('categories').select('*').order('created_at');
    if(ce) throw ce;
    CATEGORIES={};
    (cats||[]).forEach(c=>{ CATEGORIES[c.id]={id:c.id,name:c.name,icon:c.icon,color:c.color}; });

    const {data:skills,error:se}=await _sb.from('skills').select('*').order('created_at');
    if(se) throw se;
    SKILLS=(skills||[]).map(s=>({key:s.key,cat:s.cat,name:s.name,goal:s.goal,unit:s.unit,xpW:s.xp_w}));

    const {data:entries,error:ee}=await _sb.from('entries').select('date,skill,value');
    if(ee) throw ee;
    ENTRIES=(entries||[]).map(e=>({date:e.date,skill:e.skill,value:Number(e.value)}));

    setSyncStatus('ok');
  } catch(err){
    console.error('Supabase fetch error:',err);
    setSyncStatus('error');
    _loadFromLocalStorage();
  }
}

function _loadFromLocalStorage(){
  try{ CATEGORIES=JSON.parse(localStorage.getItem('lt_categories')||'{}'); }catch(e){ CATEGORIES={}; }
  try{ SKILLS=JSON.parse(localStorage.getItem('lt_skills')||'[]'); }catch(e){ SKILLS=[]; }
  try{ ENTRIES=JSON.parse(localStorage.getItem('lt_entries')||'[]'); }catch(e){ ENTRIES=[]; }
}
function _saveToLocalStorage(){
  localStorage.setItem('lt_categories',JSON.stringify(CATEGORIES));
  localStorage.setItem('lt_skills',JSON.stringify(SKILLS));
  localStorage.setItem('lt_entries',JSON.stringify(ENTRIES));
}

async function dbAddCategory(cat){
  CATEGORIES[cat.id]=cat; _saveToLocalStorage();
  if(!_sb) return;
  setSyncStatus('syncing');
  const {error}=await _sb.from('categories').insert({id:cat.id,name:cat.name,icon:cat.icon,color:cat.color});
  setSyncStatus(error?'error':'ok');
  if(error){ console.error(error); showToast('Failed to save category','error'); }
}

async function dbDeleteCategory(catId){
  const keys=SKILLS.filter(s=>s.cat===catId).map(s=>s.key);
  SKILLS=SKILLS.filter(s=>s.cat!==catId);
  ENTRIES=ENTRIES.filter(e=>!keys.includes(e.skill));
  delete CATEGORIES[catId]; _saveToLocalStorage();
  if(!_sb) return;
  setSyncStatus('syncing');
  if(keys.length) await _sb.from('entries').delete().in('skill',keys);
  await _sb.from('skills').delete().eq('cat',catId);
  const {error}=await _sb.from('categories').delete().eq('id',catId);
  setSyncStatus(error?'error':'ok');
}

async function dbAddSkill(skill){
  SKILLS.push(skill); _saveToLocalStorage();
  if(!_sb) return;
  setSyncStatus('syncing');
  const {error}=await _sb.from('skills').insert({key:skill.key,cat:skill.cat,name:skill.name,goal:skill.goal,unit:skill.unit,xp_w:skill.xpW});
  setSyncStatus(error?'error':'ok');
  if(error){ console.error(error); showToast('Failed to save skill','error'); }
}

async function dbDeleteSkill(skillKey){
  SKILLS=SKILLS.filter(s=>s.key!==skillKey);
  ENTRIES=ENTRIES.filter(e=>e.skill!==skillKey);
  _saveToLocalStorage();
  if(!_sb) return;
  setSyncStatus('syncing');
  await _sb.from('entries').delete().eq('skill',skillKey);
  const {error}=await _sb.from('skills').delete().eq('key',skillKey);
  setSyncStatus(error?'error':'ok');
}

async function dbUpdateSkill(skillKey,field,value){
  const s=SKILLS.find(s=>s.key===skillKey); if(!s) return;
  s[field]=value; _saveToLocalStorage();
  if(!_sb) return;
  const dbField=field==='xpW'?'xp_w':field;
  await _sb.from('skills').update({[dbField]:value}).eq('key',skillKey);
}

/* Entry: accumulative (positive adds, negative subtracts), stored as daily total */
async function dbSetEntry(date, skillKey, newTotal){
  ENTRIES=ENTRIES.filter(e=>!(e.date===date&&e.skill===skillKey));
  const val=Math.max(0,newTotal); // never store negative
  if(val>0) ENTRIES.push({date,skill:skillKey,value:val});
  _saveToLocalStorage();
  if(!_sb) return;
  setSyncStatus('syncing');
  await _sb.from('entries').delete().eq('date',date).eq('skill',skillKey);
  if(val>0){
    const {error}=await _sb.from('entries').insert({date,skill:skillKey,value:val});
    setSyncStatus(error?'error':'ok');
    if(error) console.error(error);
  } else {
    setSyncStatus('ok');
  }
}

/* Read helpers */
function calcTotal(skillKey){ return ENTRIES.filter(e=>e.skill===skillKey).reduce((s,e)=>s+e.value,0); }
function buildDailyMap(skillKey){ const m={}; ENTRIES.filter(e=>e.skill===skillKey).forEach(e=>{ m[e.date]=(m[e.date]||0)+e.value; }); return m; }
function calcSkillXP(skillKey){ const s=SKILLS.find(s=>s.key===skillKey); if(!s) return 0; return ENTRIES.filter(e=>e.skill===skillKey).reduce((sum,e)=>sum+e.value*(s.xpW||1),0); }
function calcCategoryXP(catId){ return SKILLS.filter(s=>s.cat===catId).reduce((sum,s)=>sum+calcSkillXP(s.key),0); }
function calcTotalXP(){ return Object.keys(CATEGORIES).reduce((sum,catId)=>sum+calcCategoryXP(catId),0); }
function getLast30(){ return Array.from({length:30},(_,i)=>dateFromOffset(29-i)); }
function getDayTotal(date, skillKey){ return ENTRIES.filter(e=>e.date===date&&e.skill===skillKey).reduce((s,e)=>s+e.value,0); }
</script>

<!-- ══════════════════════════════════════════════
     CORE MATH
══════════════════════════════════════════════ -->
<script>
function pad(n){ return String(n).padStart(2,'0'); }
function getTodayStr(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function dateFromOffset(o){ const d=new Date(); d.setDate(d.getDate()-o); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }

function xpToLevel(xp,xpPL){ return Math.min(Math.floor(xp/xpPL)+1,LEVEL_MAX); }
function getRankIdx(level){ return Math.min(Math.floor((level-1)/3),33); }
function getLevelInfo(xp,xpPL){
  const level=xpToLevel(xp,xpPL);
  const ri=getRankIdx(level); const rank=SKILL_LEVELS[ri];
  const maxed=level>=LEVEL_MAX;
  const xpInLvl=maxed?xpPL:xp%xpPL;
  const levelPct=maxed?100:Math.round(xpInLvl/xpPL*100);
  const xpToNext=maxed?0:Math.round(xpPL-xpInLvl);
  const rSL=ri*3+1; const rEL=ri===33?LEVEL_MAX:(ri+1)*3;
  const lInR=level-rSL;
  const rankPct=maxed?100:Math.min(Math.round((lInR*100+levelPct)/(rEL-rSL+1)),100);
  const nextRank=ri<33?SKILL_LEVELS[ri+1]:null;
  return {level,rank,levelPct,xpToNext,xpInLvl,rankPct,nextRank};
}

function calcStreak(skillKey){
  const skill=SKILLS.find(s=>s.key===skillKey); if(!skill) return 0;
  const daily=buildDailyMap(skillKey); const today=getTodayStr();
  const cur=new Date(today+'T12:00:00');
  if(!daily[today]||daily[today]<skill.goal) cur.setDate(cur.getDate()-1);
  let streak=0;
  for(let i=0;i<3650;i++){
    const ds=`${cur.getFullYear()}-${pad(cur.getMonth()+1)}-${pad(cur.getDate())}`;
    if(daily[ds]&&daily[ds]>=skill.goal){ streak++; cur.setDate(cur.getDate()-1); } else break;
  }
  return streak;
}

function buildRankRoad(currentLevel){
  const ci=getRankIdx(currentLevel);
  let html='<div class="rank-road">';
  SKILL_LEVELS.forEach((rank,idx)=>{
    const isPast=idx<ci; const isCur=idx===ci;
    const parts=rank.label.split(' ');
    html+=`<div class="rank-point">
      <span class="rank-name" style="color:${isCur?rank.col:'var(--very-dim)'};font-weight:${isCur?800:600}">${parts[0]}</span>
      <span class="rank-name" style="color:${isCur?rank.col:'var(--very-dim)'}">${parts.slice(1).join(' ')||''}</span>
      <div class="rank-dot${isCur?' current':''}${isPast?' past':''}"></div>
      <span class="rank-xp-lbl">Lv${idx*3+1}</span>
    </div>`;
    if(idx<33) html+=`<div class="rank-connector${isPast?' past-conn':''}"></div>`;
  });
  return html+'</div>';
}
</script>

              class="log-skill-input"
              placeholder="${done>0?done:'0'}"
              value="${done>0?done:''}"
              min="0" step="1"
              onkeydown="if(event.key==='Enter')saveLog('${date}','${skill.key}','${skill.goal}')">
          </div>
          <div class="log-progress-bar">
            <div class="log-progress-fill" id="bar-${skill.key}"
              style="width:${pct}%;background:${met?'var(--grad-bar)':'rgba(235,163,40,0.35)'}"></div>

async function saveLog(date, skillKey, goal){
  const inp=document.getElementById('inp-'+skillKey);
  if(!inp) return;
  let rawVal=inp.value.trim();
  if(rawVal==='') return;

  const skill=SKILLS.find(s=>s.key===skillKey);
  const skillName=skill?skill.name:skillKey;

  /* Support negative: subtract from current total */
  const parsed=parseFloat(rawVal);
  if(isNaN(parsed)){
    showToast('Invalid number','error'); return;
  }

  let newTotal;
  if(rawVal.startsWith('-')){
    /* Subtract mode */
    const cur=getDayTotal(date,skillKey);
    newTotal=cur+parsed; // parsed is negative
    if(newTotal<0){ showToast('Cannot go below zero — set to 0','warn'); newTotal=0; }
  } else {
    /* Absolute set */
    newTotal=parsed;
  }

  await dbSetEntry(date, skillKey, newTotal);

  /* Quick card update without full re-render */
  const done=newTotal; const met=done>=Number(goal);
  const card=document.getElementById('card-'+skillKey);
  if(card){
    card.className='log-skill-card '+(met?'met':'');
    const goalEl=card.querySelector('.log-skill-card-goal');
    if(goalEl){ goalEl.className='log-skill-card-goal '+(met?'met':''); goalEl.textContent=`${done} / ${goal} ${skill?.unit||''} ${met?'✓':''}`; }
    const barEl=document.getElementById('bar-'+skillKey);
    if(barEl){ const pct=Math.min(Math.round(done/Number(goal)*100),100); barEl.style.width=pct+'%'; barEl.style.background=met?'var(--grad-bar)':'rgba(235,163,40,0.35)'; }
    inp.value=done>0?done:'';
    inp.placeholder=String(done);
  }

  showToast(met?`✓ ${skillName} — goal met! 🎯`:`Saved ${done} ${skill?.unit||''}`, met?'success':'info', 1800);
}
</script>

function setChartRange(r){ detailRange=r; renderSkillDetail(); }

function renderChart(){
  if(!detailKey) return;
  const skill=SKILLS.find(s=>s.key===detailKey); if(!skill) return;
  const entries=ENTRIES.filter(e=>e.skill===detailKey);
  const now=new Date(); let data=[];
  if(detailRange==='day'){
    const ty=now.getFullYear();
    for(let i=89;i>=0;i--){ const d=new Date(now); d.setDate(d.getDate()-i); const ds=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; const v=entries.filter(e=>e.date===ds).reduce((s,e)=>s+e.value,0); data.push({label:`${d.getMonth()+1}/${d.getDate()}`,year:d.getFullYear()!==ty?String(d.getFullYear()):'',value:v}); }
  } else if(detailRange==='week'){
    for(let i=51;i>=0;i--){ const ws=new Date(now); ws.setDate(ws.getDate()-ws.getDay()-i*7); const we=new Date(ws); we.setDate(we.getDate()+6); const v=entries.reduce((sum,e)=>{ const ed=new Date(e.date+'T12:00:00'); return (ed>=ws&&ed<=we)?sum+e.value:sum; },0); const wn=Math.ceil((ws-new Date(ws.getFullYear(),0,1))/604800000)+1; data.push({label:`W${wn}`,year:String(ws.getFullYear()),value:v}); }
  } else if(detailRange==='month'){
    const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    for(let i=23;i>=0;i--){ const ms=new Date(now.getFullYear(),now.getMonth()-i,1); const me=new Date(now.getFullYear(),now.getMonth()-i+1,0); const v=entries.reduce((sum,e)=>{ const ed=new Date(e.date+'T12:00:00'); return (ed>=ms&&ed<=me)?sum+e.value:sum; },0); data.push({label:mn[ms.getMonth()],year:String(ms.getFullYear()),value:v}); }
  } else {
    const map={}; entries.forEach(e=>{ const y=e.date.split('-')[0]; if(y) map[y]=(map[y]||0)+e.value; });
    data=Object.keys(map).sort().map(y=>({label:y,year:'',value:map[y]}));
  }
  const scroll=document.getElementById('chart-scroll'); const wrap=document.getElementById('chart-wrap');
  if(!scroll||!wrap) return;
  wrap.querySelectorAll('.goal-line').forEach(el=>el.remove());
  if(!data.length||data.every(d=>d.value===0)){ scroll.innerHTML='<div class="chart-empty">No data yet</div>'; return; }
  const goal=skill.goal||0; const maxV=Math.max(...data.map(d=>d.value),goal||1,1);
  const IH=140; const PB=32;
  let bars='<div class="bar-group">';
  data.forEach(d=>{ const h=d.value>0?Math.max(Math.round(d.value/maxV*IH),3):0; const met=goal>0&&d.value>=goal; const bg=met?'linear-gradient(0deg,#AB6937,#EBA328)':d.value>0?'linear-gradient(0deg,#1E4445,#2a6060)':'rgba(255,255,255,0.03)'; bars+=`<div class="bar-col-wrap"><div class="bar-val">${d.value>0?d.value:''}</div><div class="bar-col" style="height:${h}px;background:${bg}"></div><div class="bar-lbl-wrap"><span class="bar-lbl">${d.label}</span>${d.year?`<span class="bar-lbl-yr">${d.year}</span>`:''}</div></div>`; });
  bars+='</div>'; scroll.innerHTML=bars;
  if(goal>0&&goal<=maxV){ const gPx=Math.round(goal/maxV*IH)+PB; const gl=document.createElement('div'); gl.className='goal-line'; gl.style.bottom=gPx+'px'; const glbl=document.createElement('div'); glbl.className='goal-lbl'; glbl.textContent='goal '+goal; gl.appendChild(glbl); wrap.appendChild(gl); }
  requestAnimationFrame(()=>{ scroll.scrollLeft=scroll.scrollWidth; });
}

function renderCalendar(){
  if(!detailKey) return;
  const skill=SKILLS.find(s=>s.key===detailKey); if(!skill) return;
  const daily=buildDailyMap(detailKey); const todS=getTodayStr();
  const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-lbl').textContent=`${MN[detailCalM]} ${detailCalY}`;
  const firstDay=new Date(detailCalY,detailCalM,1).getDay();
  const firstOffset=(firstDay+1)%7; // Saturday=0
  const daysN=new Date(detailCalY,detailCalM+1,0).getDate();
  let html='';
  ['Sat','Sun','Mon','Tue','Wed','Thu','Fri'].forEach(d=>{ html+=`<div class="cal-head">${d}</div>`; });
  for(let i=0;i<firstOffset;i++) html+='<div class="cal-cell empty"></div>';
  for(let day=1;day<=daysN;day++){
    const ds=`${detailCalY}-${pad(detailCalM+1)}-${pad(day)}`; const v=daily[ds]||0; const isT=ds===todS;
    let cls='cal-cell'; if(isT) cls+=' cal-today'; if(skill.goal>0&&v>=skill.goal) cls+=' cal-met'; else if(v>0) cls+=' cal-partial';
    html+=`<div class="${cls}"><span class="cal-day-num">${day}</span>${v>0?`<span class="cal-day-val">${v}</span>`:''}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

function shiftCal(dir){ detailCalM+=dir; if(detailCalM>11){ detailCalM=0; detailCalY++; } if(detailCalM<0){ detailCalM=11; detailCalY--; } if(detailKey) renderCalendar(); }
</script>

<!-- ══════════════════════════════════════════════
     ANALYTICS
══════════════════════════════════════════════ -->
<script>
function _showTip(ev,html){ const t=document.getElementById('trend-tooltip'); t.innerHTML=html; t.style.display='block'; t.style.left=(ev.clientX+12)+'px'; t.style.top=(ev.clientY-32)+'px'; }
function _hideTip(){ document.getElementById('trend-tooltip').style.display='none'; }

function renderAnalytics(catId){
  const cat=CATEGORIES[catId]; if(!cat) return;
  const skills=SKILLS.filter(s=>s.cat===catId);
  if(!skills.length){ document.getElementById('analytics-grid').innerHTML='<p style="color:var(--dim)">No skills in this category.</p>'; document.getElementById('analytics-cat-level').innerHTML=''; return; }
  const skillKeys=skills.map(s=>s.key);
  const catEntries=ENTRIES.filter(e=>skillKeys.includes(e.skill));
  const last30=getLast30();

  document.getElementById('analytics-hero').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:26px">${cat.icon}</span>
      <div><h2 style="font-family:var(--f-title);font-size:20px;color:#fff;line-height:1">${cat.name}</h2>
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim)">Category Analytics</div></div>
    </div>`;

  const catXP=calcCategoryXP(catId); const ci=getLevelInfo(catXP,XP_PER_CAT_LEVEL);
  const cP=ci.rank.label.split(' ');

  document.getElementById('analytics-cat-level').innerHTML=`
    <div class="cat-level-hero" style="border-color:${ci.rank.col}44">
      <div>${rankBadgeSVG(cP[0],cP.slice(1).join(' ')||'',52)}</div>
      <div style="min-width:0">
        <div style="font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:5px">Category Level</div>
        <div class="cat-level-big">${ci.level}</div>
      </div>
      <div class="cat-level-details">
        <div class="cat-level-rank" style="color:${ci.rank.col}">${ci.rank.label}</div>
        <div class="cat-level-xp">${Math.round(catXP).toLocaleString()} XP &nbsp;·&nbsp; ${ci.xpToNext.toLocaleString()} XP to Lv${Math.min(ci.level+1,LEVEL_MAX)}</div>
        <div class="cat-level-bar-track"><div class="cat-level-bar-fill" style="width:${ci.levelPct}%;background:linear-gradient(90deg,${ci.rank.col}66,${ci.rank.col})"></div></div>
        <div style="font-size:10px;color:var(--very-dim);margin-top:6px">${ci.levelPct}% through this level</div>
      </div>
    </div>`;

  const skillXP={}; skills.forEach(s=>{ skillXP[s.key]=calcSkillXP(s.key); });
  const totalXPCat=Object.values(skillXP).reduce((a,b)=>a+b,0);

  let contribHTML='';
  skills.forEach(s=>{ const xp=skillXP[s.key]||0; const pct=totalXPCat>0?Math.round(xp/totalXPCat*100):0; const si=getLevelInfo(xp,XP_PER_SKILL_LEVEL); contribHTML+=`<div class="analytics-bar-item"><span class="analytics-bar-label">${s.name} <span style="color:${si.rank.col};font-size:9px">Lv${si.level}</span></span><div class="analytics-bar-track"><div class="analytics-bar-fill" style="width:${pct}%;background:${cat.color}"></div></div><span class="analytics-bar-value">${pct}%</span></div>`; });

  let achieveHTML='';
  skills.forEach(s=>{ const daily={}; catEntries.filter(e=>e.skill===s.key).forEach(e=>{ daily[e.date]=(daily[e.date]||0)+e.value; }); const totalAch=last30.reduce((sum,ds)=>sum+(daily[ds]||0),0); const avg=totalAch/30; const pct=s.goal>0?Math.round(avg/s.goal*100):0; const disp=Math.min(pct,100); achieveHTML+=`<div class="analytics-bar-item"><span class="analytics-bar-label">${s.name}</span><div class="analytics-bar-track"><div class="analytics-bar-fill" style="width:${disp}%;background:#4ECDC4"></div></div><span class="analytics-bar-value" style="color:${pct>100?'#4ECDC4':'var(--text)'}">${pct}%${pct>100?' 🔥':''}</span></div>`; });

  /* Trend */
  const dXP={}; catEntries.forEach(e=>{ const s=skills.find(s=>s.key===e.skill); if(s) dXP[e.date]=(dXP[e.date]||0)+e.value*(s.xpW||1); });
  const allD=Object.keys(dXP).sort(); const today=getTodayStr(); const rS=allD.length?allD[0]:today;
  const dR=[]; const c2=new Date(rS+'T12:00:00'); const en=new Date(today+'T12:00:00');
  while(c2<=en){ dR.push(`${c2.getFullYear()}-${pad(c2.getMonth()+1)}-${pad(c2.getDate())}`); c2.setDate(c2.getDate()+1); }
  if(!dR.length) dR.push(today);
  const lV=dR.map(ds=>dXP[ds]||0); const mLV=Math.max(...lV,1);
  const svgW=Math.max(480,dR.length*7); const svgH=160; const pL=26,pR=8,pT=8,pB=24;
  const iW=svgW-pL-pR; const iH=svgH-pT-pB;
  let aP=`${pL},${svgH-pB} `,lP=''; const circles=[];
  dR.forEach((ds,i)=>{ const x=pL+i*iW/Math.max(dR.length-1,1); const y=svgH-pB-(lV[i]/mLV*iH); lP+=`${x.toFixed(1)},${y.toFixed(1)} `; aP+=`${x.toFixed(1)},${y.toFixed(1)} `; if(lV[i]>0) circles.push({x,y,ds,v:Math.round(lV[i])}); });
  const lX=pL+(dR.length-1)*iW/Math.max(dR.length-1,1); aP+=`${lX.toFixed(1)},${svgH-pB}`;
  let yM='',lYr='';
  dR.forEach((ds,i)=>{ const yr=ds.split('-')[0]; if(yr!==lYr){ const x=pL+i*iW/Math.max(dR.length-1,1); yM+=`<text x="${x.toFixed(1)}" y="${svgH-2}" font-size="6" fill="rgba(235,163,40,0.5)" font-family="Inter,sans-serif">${yr}</text>`; lYr=yr; } });
  let lSVG=`<svg viewBox="0 0 ${svgW} ${svgH}" style="min-width:${svgW}px;width:100%;height:${svgH}px"><polygon points="${aP}" fill="${cat.color}" opacity="0.1"/><polyline fill="none" stroke="${cat.color}" stroke-width="1.8" stroke-linejoin="round" points="${lP}"/>${yM}`;
  circles.forEach(c=>{ lSVG+=`<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="3" fill="${cat.color}" opacity="0.9" style="cursor:pointer" onmouseover="_showTip(event,'<strong>${c.ds}</strong><br>${c.v} XP')" onmouseout="_hideTip()"/>`; });
  lSVG+='</svg>';

  /* Donut */
  const dc=['#EBA328','#4ECDC4','#E8C283','#AB6937','#ff9040','#80d8ff','#EDD8DF','#e8c840','#cd7f32','#b090ff'];
  const circ=2*Math.PI*62; let dH=`<svg class="donut-svg" viewBox="0 0 160 160">`; let cum=0;
  skills.forEach((s,i)=>{ const xp=skillXP[s.key]||0; const pct=totalXPCat>0?xp/totalXPCat:0; if(pct<0.005) return; const da=pct*circ; const col=dc[i%dc.length]; dH+=`<circle cx="80" cy="80" r="62" fill="none" stroke="${col}" stroke-width="20" stroke-dasharray="${da.toFixed(2)} ${(circ-da).toFixed(2)}" stroke-dashoffset="${(-cum).toFixed(2)}" transform="rotate(-90 80 80)" style="cursor:pointer" onmouseover="_showTip(event,'<strong>${s.name}</strong><br>${Math.round(pct*100)}% of XP')" onmouseout="_hideTip()"/>`; cum+=da; });
  dH+=`<text x="80" y="76" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Cinzel,serif">${Math.round(totalXPCat).toLocaleString()}</text><text x="80" y="92" text-anchor="middle" fill="rgba(237,216,223,0.5)" font-size="9" font-family="Inter,sans-serif">Total XP</text></svg>`;
  let dL='<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px;justify-content:center">';
  skills.forEach((s,i)=>{ const pct=totalXPCat>0?Math.round((skillXP[s.key]||0)/totalXPCat*100):0; if(!pct) return; dL+=`<span style="font-size:9px;color:var(--dim);display:flex;align-items:center;gap:3px"><span style="width:7px;height:7px;border-radius:2px;background:${dc[i%dc.length]};display:inline-block"></span>${s.name} ${pct}%</span>`; });
  dL+='</div>';

  document.getElementById('analytics-grid').innerHTML=`
    <div class="analytics-card"><h4>📊 XP Contribution</h4>${contribHTML}</div>
    <div class="analytics-card"><h4>🎯 Daily Achievement (30d avg)</h4>${achieveHTML}</div>
    <div class="analytics-card" style="grid-column:1/-1;overflow:hidden"><h4>📈 XP Trend</h4><div class="line-chart-container hidden-scroll">${lSVG}</div></div>
    <div class="analytics-card"><h4>🍩 XP Distribution</h4>${dH}${dL}</div>`;
}
</script>

<!-- ══════════════════════════════════════════════
     CONTROL PAGE
══════════════════════════════════════════════ -->
<script>
function renderControl(){
  let html=`
    <div class="card" style="margin-bottom:16px">
      <h3 style="font-family:var(--f-title);color:var(--col-gold-lt);margin-bottom:4px">➕ Add Category</h3>
      <div style="font-size:11px;color:var(--dim);margin-bottom:12px">Categories group your skills</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <input id="ctrl-cat-name" class="control-input" placeholder="Category name" style="flex:1;min-width:130px">
        <input id="ctrl-cat-icon" class="control-input emoji-input" placeholder="😀" style="font-size:20px;width:56px;text-align:center;padding:6px">
        <input type="color" id="ctrl-cat-color" value="#EBA328" style="width:42px;height:38px;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer">
        <button class="btn-primary" onclick="uiAddCategory()">Add Category</button>
      </div>
    </div>`;

  const cats=Object.values(CATEGORIES);
  if(!cats.length) html+=`<div style="text-align:center;padding:40px;color:var(--dim);border:1px dashed var(--border);border-radius:var(--radius-card)"><div style="font-size:15px;margin-bottom:6px">No categories yet</div><div style="font-size:12px">Add your first category above to get started</div></div>`;

  cats.forEach(cat=>{
    const catSkills=SKILLS.filter(s=>s.cat===cat.id);
    html+=`<div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px">
        <h3 style="font-family:var(--f-title);color:${cat.color};font-size:16px">${cat.icon} ${cat.name}</h3>
        <button class="btn-danger" onclick="uiDeleteCategory('${cat.id}')">🗑️ Delete</button>
      </div>`;
    if(!catSkills.length) html+=`<div style="font-size:11px;color:var(--very-dim);margin-bottom:10px;padding:8px;border:1px dashed var(--border);border-radius:7px;text-align:center">No skills yet — add one below</div>`;
    catSkills.forEach(skill=>{
      html+=`<div style="display:flex;align-items:center;gap:7px;padding:9px;background:rgba(255,255,255,0.03);border-radius:8px;margin-bottom:6px;flex-wrap:wrap">
        <span style="flex:1;min-width:100px;font-size:12px;font-weight:600">${skill.name}</span>
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          <label style="font-size:9px;color:var(--dim)">Goal</label>
          <input type="number" value="${skill.goal}" min="1" style="width:62px" class="control-input" onchange="dbUpdateSkill('${skill.key}','goal',Math.max(1,parseInt(this.value)||${skill.goal}))">
          <span style="font-size:9px;color:var(--dim)">${skill.unit}</span>
          <label style="font-size:9px;color:var(--dim)">XP/unit</label>
          <input type="number" value="${skill.xpW||1}" min="1" style="width:52px" class="control-input" onchange="dbUpdateSkill('${skill.key}','xpW',Math.max(1,parseInt(this.value)||${skill.xpW||1}))">
          <button class="btn-danger" style="padding:4px 8px;font-size:12px" onclick="uiDeleteSkill('${skill.key}','${skill.name}')">🗑️</button>
        </div>
      </div>`;
    });
    html+=`<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:8px">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:8px">+ Add Skill</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        <input id="ctrl-skill-name-${cat.id}" class="control-input" placeholder="Skill name" style="flex:1;min-width:110px">
        <input id="ctrl-skill-goal-${cat.id}" type="number" class="control-input" placeholder="Daily goal" style="width:78px">
        <input id="ctrl-skill-unit-${cat.id}" class="control-input" placeholder="Unit" style="width:70px">
        <input id="ctrl-skill-xpw-${cat.id}" type="number" class="control-input" placeholder="XP/u" value="1" style="width:54px">
        <button class="btn-primary" onclick="uiAddSkill('${cat.id}')">+ Add</button>
      </div>
    </div></div>`;
  });
  document.getElementById('control-content').innerHTML=html;
}

async function uiAddCategory(){
  const name=(document.getElementById('ctrl-cat-name')?.value||'').trim();
  /* Accept the full emoji value — no maxlength restriction in JS */
  const rawIcon=(document.getElementById('ctrl-cat-icon')?.value||'').trim();
  const icon=rawIcon||'📌';
  const color=document.getElementById('ctrl-cat-color')?.value||'#EBA328';
  if(!name){ showToast('Please enter a category name','warn'); return; }
  /* Generate a safe ID from name + timestamp suffix to avoid collisions */
  const base=name.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
  const id=base||('cat_'+Date.now());
  /* Check by name (not ID) to allow similar names */
  const exists=Object.values(CATEGORIES).find(c=>c.name.toLowerCase()===name.toLowerCase());
  if(exists){ showToast('A category with this name already exists','warn'); return; }
  await dbAddCategory({id,name,icon,color});
  showToast(`✓ Category "${name}" added`,'success');
  document.getElementById('ctrl-cat-name').value='';
  document.getElementById('ctrl-cat-icon').value='';
  renderControl();
}

async function uiDeleteCategory(catId){
  const catName=CATEGORIES[catId]?.name||catId;
  const ok=await showConfirm('Delete Category',`Delete "${catName}" and ALL its skills & logged entries? This cannot be undone.`,'Delete All');
  if(!ok) return;
  await dbDeleteCategory(catId);
  showToast(`Deleted category "${catName}"`,'info');
  renderControl();
}

async function uiAddSkill(catId){
  const name=(document.getElementById(`ctrl-skill-name-${catId}`)?.value||'').trim();
  const goal=parseInt(document.getElementById(`ctrl-skill-goal-${catId}`)?.value)||10;
  const unit=(document.getElementById(`ctrl-skill-unit-${catId}`)?.value||'').trim()||'units';
  const xpW=parseInt(document.getElementById(`ctrl-skill-xpw-${catId}`)?.value)||1;
  if(!name){ showToast('Please enter a skill name','warn'); return; }
  /* Key: catId + sanitized name + short hash to avoid duplicates */
  const sanitized=name.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
  const key=catId+'_'+sanitized+'_'+Date.now().toString(36).slice(-4);
  await dbAddSkill({key,cat:catId,name,goal,unit,xpW});
  showToast(`✓ Skill "${name}" added`,'success');
  /* Clear fields */
  ['ctrl-skill-name-','ctrl-skill-goal-','ctrl-skill-unit-'].forEach(p=>{ const el=document.getElementById(p+catId); if(el) el.value=''; });
  renderControl();
}

async function uiDeleteSkill(skillKey, skillName){
  const ok=await showConfirm('Delete Skill',`Delete "${skillName||skillKey}" and all its logged entries? This cannot be undone.`,'Delete');
  if(!ok) return;
  await dbDeleteSkill(skillKey);
  showToast(`Deleted skill "${skillName||skillKey}"`,'info');
  renderControl();
}
</script>
